<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="style.css" />
  <script src="cookies.js"></script>
  <script src="storage.js"></script>
</head>
<body>
  <div class="container">
    <h1>Register</h1>

    <form id="registerForm">
      <label for="username">Username</label>
      <input type="text" id="username" />

      <label for="email">Email</label>
      <input type="email" id="email" />

      <label for="password">Parola</label>
      <input type="password" id="password" />

      <label for="confirmPassword">Confirmare parola</label>
      <input type="password" id="confirmPassword" />

      <button type="submit">Inregistrare</button>
    </form>

    <div id="message"></div>

    <a class="small-link" href="login.html">Ai deja cont? Mergi la login</a>
  </div>

  <script>
    function applyTheme() {
      const theme = CookieManager.get("theme") || "light";
      document.body.classList.remove("light", "dark");
      document.body.classList.add(theme);
    }

    function showMessage(text, type) {
      const message = document.getElementById("message");
      message.className = type === "success" ? "alert-success" : "alert-error";
      message.textContent = text;
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (!username || !email || !password || !confirmPassword) {
        showMessage("Toate campurile sunt obligatorii.", "error");
        return;
      }

      if (username.length < 3) {
        showMessage("Username-ul trebuie sa aiba minim 3 caractere.", "error");
        return;
      }

      if (!isValidEmail(email)) {
        showMessage("Email invalid.", "error");
        return;
      }

      if (password.length < 6) {
        showMessage("Parola trebuie sa aiba minim 6 caractere.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Parolele nu coincid.", "error");
        return;
      }

      const users = StorageManager.getLocal("users") || [];

      const usernameExists = users.some(user => user.username === username);
      if (usernameExists) {
        showMessage("Username deja existent.", "error");
        return;
      }

      const newUser = {
        id: users.length > 0 ? Math.max(...users.map(user => user.id)) + 1 : 1,
        username,
        email,
        password
      };

      users.push(newUser);
      StorageManager.setLocal("users", users);

      showMessage("Cont creat cu succes. Redirectionare catre login...", "success");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    });

    applyTheme();
  </script>
</body>
</html>
