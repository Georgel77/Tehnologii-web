<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
  <script src="cookies.js"></script>
  <script src="storage.js"></script>
</head>
<body>
  <div class="container">
    <h1>Login</h1>

    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" />

      <label for="password">Parola</label>
      <input type="password" id="password" />

      <div class="checkbox-row">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Tine-ma minte</label>
      </div>

      <button type="submit">Autentificare</button>
    </form>

    <div id="message"></div>

    <a class="small-link" href="register.html">Nu ai cont? Mergi la inregistrare</a>
  </div>

  <script>
    function applyTheme() {
      const theme = CookieManager.get("theme") || "light";
      document.body.classList.remove("light", "dark");
      document.body.classList.add(theme);
    }

    function initDefaultUsers() {
      const users = StorageManager.getLocal("users");

      if (!users || !Array.isArray(users) || users.length === 0) {
        const defaultUsers = [
          { id: 1, username: "admin", password: "password", email: "admin@example.com" },
          { id: 2, username: "student", password: "student123", email: "student@example.com" }
        ];
        StorageManager.setLocal("users", defaultUsers);
      }
    }

    function preloadRememberedUser() {
      const rememberedUsername = StorageManager.getLocal("rememberedUsername");
      if (rememberedUsername) {
        document.getElementById("username").value = rememberedUsername;
        document.getElementById("rememberMe").checked = true;
      }
    }

    function showMessage(text, type) {
      const message = document.getElementById("message");
      message.className = type === "success" ? "alert-success" : "alert-error";
      message.textContent = text;
    }

    function generateSessionId() {
      return "sess-" + Math.random().toString(36).slice(2) + Date.now();
    }

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const rememberMe = document.getElementById("rememberMe").checked;

      const users = StorageManager.getLocal("users") || [];
      const foundUser = users.find(
        user => user.username === username && user.password === password
      );

      if (!foundUser) {
        showMessage("Username sau parola incorecte.", "error");
        return;
      }

      if (rememberMe) {
        StorageManager.setLocal("rememberedUsername", username);
      } else {
        StorageManager.removeLocal("rememberedUsername");
      }

      const sessionData = {
        userId: foundUser.id,
        username: foundUser.username,
        email: foundUser.email,
        loginTime: new Date().toISOString(),
        sessionId: generateSessionId()
      };

      StorageManager.setSession("session", sessionData);

      showMessage("Autentificare reusita. Redirectionare...", "success");

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
    });

    applyTheme();
    initDefaultUsers();
    preloadRememberedUser();
  </script>
</body>
</html>
