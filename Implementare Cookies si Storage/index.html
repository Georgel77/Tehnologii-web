<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina Principala</title>
  <link rel="stylesheet" href="style.css" />
  <script src="cookies.js"></script>
  <script src="storage.js"></script>
</head>
<body>
  <h1>Pagina Principala</h1>

  <p class="welcome" id="welcomeMessage"></p>
  <p id="visitCount"></p>

  <nav>
    <a href="preferences.html">Setari Preferinte</a>
    <a href="cookies-info.html">Vizualizare Cookies</a>
    <a href="login.html">Autentificare</a>
  </nav>

  <div class="section">
    <h2>Cookies active</h2>
    <table id="cookiesTable">
      <thead>
        <tr>
          <th>Nume</th>
          <th>Valoare</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Date din localStorage</h2>
    <table id="localStorageTable">
      <thead>
        <tr>
          <th>Cheie</th>
          <th>Valoare</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Date din sessionStorage</h2>
    <table id="sessionStorageTable">
      <thead>
        <tr>
          <th>Cheie</th>
          <th>Valoare</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <button id="clearAllBtn">Sterge tot</button>

  <script>
    function applyTheme() {
      const theme = CookieManager.get("theme") || "light";
      document.body.classList.remove("light", "dark");
      document.body.classList.add(theme);
    }

    function updateWelcome() {
      const username = CookieManager.get("username") || "Vizitator";
      document.getElementById("welcomeMessage").textContent = `Bun venit, ${username}!`;
    }

    function updateVisits() {
      let visits = parseInt(CookieManager.get("visits")) || 0;
      visits++;
      CookieManager.set("visits", visits, 7);
      document.getElementById("visitCount").textContent = `Numar vizite: ${visits}`;
    }

    function renderCookies() {
      const tbody = document.querySelector("#cookiesTable tbody");
      tbody.innerHTML = "";

      const cookies = CookieManager.getAll();

      if (Object.keys(cookies).length === 0) {
        tbody.innerHTML = `<tr><td colspan="2">Nu exista cookies.</td></tr>`;
        return;
      }

      for (const key in cookies) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${key}</td>
          <td>${cookies[key]}</td>
        `;
        tbody.appendChild(row);
      }
    }

    function renderLocalStorage() {
      const tbody = document.querySelector("#localStorageTable tbody");
      tbody.innerHTML = "";

      const data = StorageManager.getAllLocal();

      if (Object.keys(data).length === 0) {
        tbody.innerHTML = `<tr><td colspan="2">Nu exista date in localStorage.</td></tr>`;
        return;
      }

      for (const key in data) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${key}</td>
          <td>${JSON.stringify(data[key])}</td>
        `;
        tbody.appendChild(row);
      }
    }

    function renderSessionStorage() {
      const tbody = document.querySelector("#sessionStorageTable tbody");
      tbody.innerHTML = "";

      const data = StorageManager.getAllSession();

      if (Object.keys(data).length === 0) {
        tbody.innerHTML = `<tr><td colspan="2">Nu exista date in sessionStorage.</td></tr>`;
        return;
      }

      for (const key in data) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${key}</td>
          <td>${JSON.stringify(data[key])}</td>
        `;
        tbody.appendChild(row);
      }
    }

    document.getElementById("clearAllBtn").addEventListener("click", function () {
      CookieManager.deleteAll();
      StorageManager.clearLocal();
      StorageManager.clearSession();
      alert("Toate datele au fost sterse.");
      location.reload();
    });

    applyTheme();
    updateWelcome();
    updateVisits();
    renderCookies();
    renderLocalStorage();
    renderSessionStorage();
  </script>
</body>
</html>
